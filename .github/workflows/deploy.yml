name: Deploy Flight App

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ✨ 깃허브 인텔 서버에서 ARM 이미지를 빌드할 수 있게 해주는 마법(에뮬레이터)입니다.
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set Image Names
      run: |
        REPO_NAME=$(echo "${{ github.repository }}/flight" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME_FRONTEND=ghcr.io/${REPO_NAME}-frontend" >> $GITHUB_ENV
        echo "IMAGE_NAME_BACKEND=ghcr.io/${REPO_NAME}-backend" >> $GITHUB_ENV

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        platforms: linux/arm64  # ✨ 오직 ARM 용으로만 빌드 (속도 대폭 향상)
        push: true
        tags: ${{ env.IMAGE_NAME_FRONTEND }}:latest

    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        platforms: linux/arm64  # ✨ 오직 ARM 용으로만 빌드
        push: true
        tags: ${{ env.IMAGE_NAME_BACKEND }}:latest

    # docker-compose.yml 파일을 오라클 서버로 복사
    - name: Copy docker-compose.yml to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ${{ secrets.ORACLE_USER }}
        key: ${{ secrets.ORACLE_KEY }}
        source: "docker-compose.yml"
        target: "~/" 

    # 서버에 접속하여 배포 실행
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ${{ secrets.ORACLE_USER }}
        key: ${{ secrets.ORACLE_KEY }}
        envs: IMAGE_NAME_FRONTEND, IMAGE_NAME_BACKEND
        script: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # ARM 기반 오라클 서버에서 ARM 이미지를 당겨옵니다.
          docker pull $IMAGE_NAME_FRONTEND:latest
          docker pull $IMAGE_NAME_BACKEND:latest
          
          export IMAGE_NAME_FRONTEND=$IMAGE_NAME_FRONTEND
          export IMAGE_NAME_BACKEND=$IMAGE_NAME_BACKEND
          
          docker-compose down
          docker-compose up -d
          
          docker image prune -f